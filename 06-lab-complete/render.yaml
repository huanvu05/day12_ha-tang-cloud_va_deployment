services:
  - type: web
    name: day12-production-agent
    runtime: docker
    region: singapore
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: APP_VERSION
        value: "1.0.0"
      - key: REDIS_URL
        fromService:
          name: day12-agent-redis
          type: redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: AGENT_API_KEY
        generateValue: true
      - key: MONTHLY_BUDGET_USD
        value: "10.0"
      - key: RATE_LIMIT_PER_MINUTE
        value: "10"
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: ALLOWED_ORIGINS
        value: "*"

  - type: redis
    name: day12-agent-redis
    region: singapore
    plan: free
    maxmemoryPolicy: allkeys-lru
